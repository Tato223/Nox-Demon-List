<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <!-- scripts -->
     <script src="signup_page_logic.js" defer></script>

    <!-- styles -->
    <link rel="Stylesheet" href="/frontend/pages/signup_page/signup_page.css" />
    <link rel="Stylesheet" href="/frontend/components/header.css" />
    <link rel="Stylesheet" href="/frontend/components/fonts.css" />
    <link rel="stylesheet" href="/frontend/components/defaults.css" />

  </head>
  <body>
    <div class="background">
      <header>
        <h1 class="title">
          <a class="title__link" href="/frontend/pages/home_page/index.html"
            >The Nox List</a
          >
        </h1>

        <form class="search-bar__form">
          <label class="search-bar__label" for="search-bar">🔎</label>
          <input type="search" id="search-bar" placeholder="Search levels..." />
        </form>

        <div class="header__links">
          <a
            class="level-manager"
            href="/frontend/pages/level_manager/level_manager.html"
            >Level Manager</a
          >

          <button class="signup-button">
            <a href="/frontend/pages/signup_page/signup.html"> Sign up </a>
          </button>
        </div>
      </header>

      <div class="signup-container">
        <h2 class="signup-container__heading">Sign up for an account</h2>

        <form class="signup-container__form">

          <div class="email-block">
            <label for="email">
              Email
              <span class="mandatory">*</span>
            </label>

            <input
              id="email"
              type="email"
              placeholder="Enter a valid email address"
              required
              autocomplete="email"
            />
          </div>
            
          <div class="username-block">
            <label for="username">
              Username
              <span class="mandatory">*</span>
            </label>

            <input
              id="username"
              type="text"
              placeholder="Enter your username"
              required
              autocomplete="username"
              minlength="3"
              maxlength="16"
            />
          </div>

          <div class="password-block">
            <label for="password">
              Password
              <span class="mandatory">*</span>
            </label>

            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              required
              minlength="8"
            />
          </div>

          <input class="submit-button" type="submit" value="Sign up" />
        </form>
      </div>
    </div>
  </body>
</html>
